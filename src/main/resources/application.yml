spring:
  application:
    name: rate-limiter

  threads:
    virtual:
      enabled: true

  datasource:
    url:                  ${DB_URL:jdbc:postgresql://localhost:5432/ratelimiter_db}
    username:             ${DB_USER:postgres}
    password:             ${DB_PASS:postgres}
    driver-class-name:    org.postgresql.Driver
    hikari:
      pool-name:                  RateLimiterPool
      maximum-pool-size:          10
      minimum-idle:               2
      connection-timeout:         3000
      idle-timeout:               600000
      max-lifetime:               1800000
      leak-detection-threshold:   5000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect:           org.hibernate.dialect.PostgreSQLDialect
        format_sql:        true
        use_sql_comments:  true
        jdbc:
          batch_size:      50
          fetch_size:      100
        order_inserts:     true
        order_updates:     true

  flyway:
    enabled:              true
    locations:            classpath:db/migration
    baseline-on-migrate:  false
    out-of-order:         false
    validate-on-migrate:  true

  data:
    redis:
      host:    ${REDIS_HOST:localhost}
      port:    ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active:  20
          max-idle:    10
          min-idle:    2
          max-wait:    2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks:             all
      retries:          3
      properties:
        enable.idempotence:                    true
        max.in.flight.requests.per.connection:  1
        delivery.timeout.ms:                    30000
    consumer:
      group-id:            rate-limit-audit-consumer
      auto-offset-reset:   earliest
      enable-auto-commit:  false
      max-poll-records:    100
      key-deserializer:    org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer:  org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ratelimiter.dto.internal"
    listener:
      ack-mode:    MANUAL
      concurrency: 3

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, info, metrics
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

rate-limiter:
  tenant-cache-ttl-seconds: 30
  kafka:
    topics:
      audit: rate-limit-audit
      audit-dlt: rate-limit-audit-dlt
    consumer-groups:
      audit: rate-limit-audit-consumer
      dlt: rate-limit-dlt-handler

logging:
  level:
    com.ratelimiter:            DEBUG
    org.springframework.kafka:  WARN
    org.hibernate.SQL:          WARN